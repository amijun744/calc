<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultima Pro | TypeScript Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="theme-neon">
    <div class="cursor-glow" id="glow"></div>

    <!-- Sliding Graph Panel -->
    <div class="graph-panel" id="graph-panel">
        <div class="graph-header">
            <span>Function Visualizer</span>
            <button onclick="toggleGraph()" class="close-btn">×</button>
        </div>
        <canvas id="mathChart"></canvas>
    </div>

    <!-- Persistent History Sidebar -->
    <div class="history-sidebar" id="history-sidebar">
        <div class="sidebar-header">
            <span>Audit Log</span>
            <div class="action-icons">
                <button onclick="exportToCSV()" title="Export CSV">📥</button>
                <button onclick="clearHistory()" title="Clear All">🗑️</button>
                <button onclick="toggleHistory()" class="close-btn">×</button>
            </div>
        </div>
        <div id="history-list" class="history-list"></div>
    </div>

    <div class="calculator">
        <div class="header">
            <div class="theme-bar">
                <span onclick="setTheme('neon')" class="dot neon"></span>
                <span onclick="setTheme('sunset')" class="dot sunset"></span>
                <span onclick="setTheme('midnight')" class="dot midnight"></span>
            </div>
            <button onclick="toggleHistory()" class="history-btn">HISTORY</button>
            <div class="mode-toggle" id="mode-btn" onclick="toggleMode()">Converter</div>
        </div>

        <div class="current-history" id="current-history">Ready</div>
        <input type="text" class="display" id="display" placeholder="0" disabled>
        
        <div id="converter-controls" class="converter-row" style="display:none">
            <select id="unit-type" onchange="updateUnitOptions()">
                <option value="currency">Currency</option>
                <option value="length">Length</option>
            </select>
            <div class="unit-selectors">
                <select id="from-unit"></select>
                <span>→</span>
                <select id="to-unit"></select>
            </div>
        </div>

        <div class="buttons">
            <!-- Row 1 -->
            <button onclick="memoryClear()" class="mem">MC</button>
            <button onclick="memoryRecall()" class="mem">MR</button>
            <button onclick="memoryAdd()" class="mem">M+</button>
            <button onclick="toggleGraph()" class="sci graph-btn">GRAPH</button>

            <!-- Row 2 -->
            <button onclick="calculateFact()" class="sci">x!</button>
            <button onclick="calculateSqrt()" class="sci">√</button>
            <button onclick="appendToDisplay('**2')" class="sci">x²</button>
            <button onclick="appendToDisplay('Math.PI')" class="sci">π</button>

            <!-- Row 3 -->
            <button onclick="calculateSin()" class="sci">sin</button>
            <button onclick="calculateCos()" class="sci">cos</button>
            <button onclick="appendToDisplay('x')" class="sci">x</button>
            <button onclick="clearDisplay()" class="operator ac">AC</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('/')" class="operator">÷</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('*')" class="operator">×</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('-')" class="operator">−</button>
            
            <button onclick="appendToDisplay('0')" class="zero">0</button>
            <button onclick="appendToDisplay('.')" class="dot">.</button>
            <button onclick="appendToDisplay('+')" class="operator">+</button>
            <button onclick="calculate()" class="equals">=</button>
        </div>
    </div>

    <!-- Use type="module" if you are using a transpiler, otherwise use compiled JS -->
    <script src="script.js"></script>
</body>
</html>
